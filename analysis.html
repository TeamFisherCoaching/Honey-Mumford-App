<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#002147">
  <title>Your Learning‑Style Analysis – Team Fisher</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>

  <script src="script-analysis.js" defer></script>
</head>
<body>
  <header>
    <img src="logo.jpg" alt="Team Fisher logo" class="logo">
  </header>
  <main class="container">
    <h1>Honey &amp; Mumford Analysis</h1>

    <canvas id="radarChart" width="400" height="400"></canvas>
    <div id="score-values" class="score-values"></div>

    <div class="btn-row">
      <a id="email-link" class="primary-btn" href="#">Email my results 📧</a>
      <button id="pdf-btn" class="primary-btn">Download PDF 📄</button>
    </div>

    <div id="summary" class="card"></div>
    <div id="pros-cons" class="card"></div>
  </main>
  <footer>
    <p>&copy; 2025 Team Fisher Coaching</p>
  </footer>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
