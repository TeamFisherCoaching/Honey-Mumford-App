<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honey &amp; Mumford Questionnaire – Team Fisher</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="script-quiz.js" defer></script>
</head>
<body>
  <div class="container">
    <img src="logo.jpg" alt="Team Fisher logo" class="logo">
    <h1>Honey &amp; Mumford Learning Styles Questionnaire</h1>
    <div id="question-container" class="card">
      <p id="question-text"></p>
      <div class="buttons">
        <button id="agree-btn">Yes</button>
        <button id="disagree-btn">No</button>
      </div>
      <p id="progress"></p>
    </div>
    <div id="result-container" class="card hidden">
      <h2>Your learning-style snapshot</h2>
      <canvas id="radarChart" width="400" height="400"></canvas>
      <a id="analysis-link" class="primary-btn" href="#">Detailed analysis ↗</a>
    </div>
  </div>
</body>
</html>
